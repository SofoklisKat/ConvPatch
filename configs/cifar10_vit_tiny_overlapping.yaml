# CIFAR-10: ViT-Tiny with OVERLAPPING patch embedding (variant C).
# Identical to the linear baseline except model.patch_embed.
run_name: cifar10_vit_tiny_overlapping
out_dir: runs
seed: 0

data:
  dataset: cifar10
  data_dir: ./data
  img_size: 32
  batch_size: 128
  num_workers: 4
  randaugment: true
  randaug_n: 2
  randaug_m: 9

model:
  size: tiny
  patch_size: 4
  patch_embed: overlapping   # <-- variant C
  in_chans: 3
  drop_path_rate: 0.1
  drop_rate: 0.0

train:
  device: cuda:0
  amp: true
  epochs: 200
  warmup_epochs: 20
  lr: 0.001
  min_lr: 1.0e-6
  weight_decay: 0.05
  betas: [0.9, 0.999]
  grad_clip: 1.0
  label_smoothing: 0.1
  mixup: true
  mixup_alpha: 0.8
  cutmix_alpha: 1.0
  mixup_prob: 1.0
  mixup_switch_prob: 0.5
  log_interval: 100
  deterministic: false
